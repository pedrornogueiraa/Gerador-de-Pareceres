<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criador de Pareceres — Lumens Atuarial</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --roxo:        #5c3d9e;
    --roxo-escuro: #3b2370;
    --roxo-suave:  #f0ebfa;
    --roxo-borda:  #d8ccf0;
    --roxo-hover:  #ede6f8;
    --branco:      #ffffff;
    --cinza-bg:    #f7f7f9;
    --cinza-linha: #e8e8ed;
    --cinza-texto: #888899;
    --texto:       #1a1a2e;
    --verde:       #27ae60;
    --vermelho:    #e74c3c;
    --radius:      6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--cinza-bg); color: var(--texto); min-height: 100vh; font-size: 13px; }

  header {
    background: var(--branco);
    border-bottom: 1px solid var(--cinza-linha);
    padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-img { height: 30px; width: auto; }
  .logo-divider { width: 1px; height: 22px; background: var(--cinza-linha); }
  .logo-sub { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cinza-texto); }

  .status-wrap { display: flex; align-items: center; gap: 7px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--cinza-linha); background: var(--cinza-bg); }
  #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; flex-shrink: 0; }
  #status-dot.ok  { background: var(--verde); }
  #status-dot.err { background: var(--vermelho); }
  #status-label { color: var(--cinza-texto); font-size: 11px; font-family: 'Montserrat', sans-serif; }

  .layout { display: grid; grid-template-columns: 300px 1fr 290px; height: calc(100vh - 56px); overflow: hidden; }
  .panel { border-right: 1px solid var(--cinza-linha); display: flex; flex-direction: column; overflow: hidden; background: var(--branco); }
  .panel:last-child { border-right: none; }

  .panel-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--cinza-linha); background: var(--branco); flex-shrink: 0; }
  .panel-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--roxo); margin-bottom: 2px; }
  .panel-sub { color: var(--cinza-texto); font-size: 11px; }

  .panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; background: var(--cinza-bg); }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--roxo-borda); border-radius: 2px; }

  .field { margin-bottom: 13px; }
  label { display: block; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  input, select, textarea { width: 100%; background: var(--branco); border: 1px solid var(--cinza-linha); border-radius: var(--radius); color: var(--texto); font-family: 'Inter', sans-serif; font-size: 13px; padding: 8px 11px; transition: border-color 0.2s; outline: none; }
  input::placeholder, textarea::placeholder { color: #bbb; }
  input:focus, select:focus, textarea:focus { border-color: var(--roxo); }
  textarea { resize: vertical; min-height: 70px; }

  .search-wrap { padding: 10px 18px; border-bottom: 1px solid var(--cinza-linha); flex-shrink: 0; background: var(--branco); }

  .categoria-group { margin-bottom: 4px; }
  .categoria-label { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--cinza-texto); padding: 7px 4px 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; transition: color 0.15s; }
  .categoria-label:hover { color: var(--roxo); }
  .categoria-label .arrow { font-size: 9px; transition: transform 0.2s; color: #ccc; }
  .categoria-label.collapsed .arrow { transform: rotate(-90deg); }
  .cat-count { margin-left: auto; background: var(--roxo-suave); color: var(--roxo); font-size: 9px; border-radius: 8px; padding: 1px 6px; font-weight: 700; }

  .topicos-list { display: flex; flex-direction: column; gap: 1px; padding-bottom: 4px; }
  .topicos-list.hidden { display: none; }
  .topico-item { display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 5px; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; }
  .topico-item:hover { background: var(--roxo-hover); }
  .topico-item.selected { background: var(--roxo-suave); border-color: var(--roxo-borda); }
  .topico-check { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--cinza-linha); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.12s; font-size: 9px; }
  .topico-item.selected .topico-check { background: var(--roxo); border-color: var(--roxo); color: white; }
  .topico-nome { font-size: 12px; line-height: 1.35; color: var(--texto); }

  .selected-list { display: flex; flex-direction: column; gap: 4px; }
  .selected-item { background: var(--branco); border: 1px solid var(--cinza-linha); border-radius: 5px; padding: 8px 10px; display: flex; align-items: flex-start; gap: 7px; cursor: grab; transition: border-color 0.15s; }
  .selected-item:hover { border-color: var(--roxo-borda); }
  .selected-item.dragging { opacity: 0.35; }
  .selected-item.drag-over { border-color: var(--roxo); box-shadow: 0 0 0 2px var(--roxo-suave); }
  .drag-handle { color: #ccc; font-size: 11px; padding-top: 2px; cursor: grab; flex-shrink: 0; }
  .selected-nome { font-size: 12px; flex: 1; line-height: 1.4; color: var(--texto); }
  .selected-cat { font-size: 10px; color: var(--cinza-texto); margin-top: 1px; }
  .remove-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 0; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
  .remove-btn:hover { color: var(--vermelho); }

  .empty-state { color: var(--cinza-texto); font-size: 12px; text-align: center; padding: 32px 12px; line-height: 1.7; }
  .count-badge { background: var(--roxo); color: white; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 7px; margin-left: 5px; font-family: 'Montserrat', sans-serif; }

  .gerar-wrap { padding: 14px 18px; border-top: 1px solid var(--cinza-linha); flex-shrink: 0; background: var(--branco); }
  .btn-gerar { width: 100%; background: var(--roxo); color: white; border: none; border-radius: var(--radius); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 11px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .btn-gerar:hover:not(:disabled) { background: var(--roxo-escuro); }
  .btn-gerar:active:not(:disabled) { transform: scale(0.98); }
  .btn-gerar:disabled { background: var(--cinza-linha); color: var(--cinza-texto); cursor: not-allowed; }

  .categoria-inativos .categoria-label { opacity: 0.5; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.75); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 14px; backdrop-filter: blur(3px); }
  .loading-overlay.show { display: flex; }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--cinza-linha); border-top-color: var(--roxo); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.1em; color: var(--cinza-texto); text-transform: uppercase; }

  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--branco); border: 1px solid var(--cinza-linha); border-radius: var(--radius); padding: 11px 18px; font-size: 13px; color: var(--texto); z-index: 999; opacity: 0; transform: translateY(6px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; max-width: 300px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--verde); }
  #toast.error   { border-color: var(--vermelho); }
</style>
</head>

<div class="layout">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Dados do Caso</div>
      <div class="panel-sub">Informações para o parecer</div>
    </div>
    <div class="panel-body">
      <div class="field"><label>Número do Processo</label><input type="text" id="processo" placeholder="0000000-00.0000.0.00.0000"></div>
      <div class="field"><label>Vara / Juízo</label><input type="text" id="vara" placeholder="Ex: 3ª Vara do Trabalho de Curitiba"></div>
      <div class="field"><label>Autor / Reclamante</label><input type="text" id="participante" placeholder="Nome completo"></div>
      <div class="field"><label>Demanda / Objeto</label><textarea id="demanda" placeholder="Descreva resumidamente a demanda..."></textarea></div>
      <div class="field"><label>Data de Entrega</label><input type="text" id="entrega" placeholder="Ex: 01 de março de 2026"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Banco de Teses <span id="count-badge"></span></div>
      <div class="panel-sub">Clique para adicionar ao parecer</div>
    </div>
    <div class="search-wrap"><input type="text" id="busca" placeholder="Buscar tópico..."></div>
    <div class="panel-body" id="topicos-container"><div class="empty-state">Carregando tópicos...</div></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Parecer <span id="sel-count"></span></div>
      <div class="panel-sub">Arraste para reordenar</div>
    </div>
    <div class="panel-body"><div id="selected-list" class="selected-list"><div class="empty-state">Nenhum tópico selecionado.<br>Clique nos tópicos ao lado.</div></div></div>
    <div class="gerar-wrap"><button class="btn-gerar" id="btn-gerar" disabled>Gerar Parecer</button></div>
  </div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text">Gerando parecer...</div></div>
<div id="toast"></div>

<script>
const API = 'http://localhost:5000';
let todosTopicos = [], selecionados = [], dragSrc = null;

async function checkStatus() {
  try {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    if (d.dropbox_configurado) {
      dot.className = d.template_ok ? 'ok' : 'err';
      lbl.textContent = d.template_ok ? 'Pronto' : 'Template não encontrado';
    } else {
      dot.className = 'err';
      lbl.textContent = 'Dropbox não configurado';
    }
  } catch {
    document.getElementById('status-dot').className = 'err';
    document.getElementById('status-label').textContent = 'Backend offline';
  }
}

async function carregarTopicos() {
  try {
    const r = await fetch(`${API}/api/topicos`);
    const d = await r.json();
    todosTopicos = d.topicos || [];
    const ativos = todosTopicos.filter(t => !t.path.includes('Arquivos Inativos'));
    document.getElementById('count-badge').innerHTML = `<span class="count-badge">${ativos.length}</span>`;
    renderTopicos(todosTopicos);
  } catch {
    document.getElementById('topicos-container').innerHTML = '<div class="empty-state">Erro ao carregar tópicos.<br>Verifique se o servidor está rodando.</div>';
  }
}

function renderTopicos(lista) {
  const container = document.getElementById('topicos-container');
  const filtro = document.getElementById('busca').value.toLowerCase();
  const toRender = filtro ? lista : lista.filter(t => !t.path.includes('Arquivos Inativos'));
  const grupos = {};
  toRender.forEach(t => {
    const cat = t.path.includes('Arquivos Inativos') ? '⚠ Arquivos Inativos' : t.categoria;
    if (!grupos[cat]) grupos[cat] = [];
    grupos[cat].push(t);
  });
  if (!Object.keys(grupos).length) { container.innerHTML = '<div class="empty-state">Nenhum tópico encontrado.</div>'; return; }
  container.innerHTML = '';
  Object.entries(grupos).sort((a,b) => { if(a[0].includes('Inativos')) return 1; if(b[0].includes('Inativos')) return -1; return a[0].localeCompare(b[0],'pt-BR'); }).forEach(([cat, items]) => {
    const group = document.createElement('div');
    group.className = 'categoria-group' + (cat.includes('Inativos') ? ' categoria-inativos' : '');
    const label = document.createElement('div');
    label.className = 'categoria-label' + (cat.includes('Inativos') && !filtro ? ' collapsed' : '');
    label.innerHTML = `<span class="arrow">▾</span> ${cat} <span class="cat-count">${items.length}</span>`;
    const list = document.createElement('div');
    list.className = 'topicos-list' + (cat.includes('Inativos') && !filtro ? ' hidden' : '');
    label.onclick = () => { label.classList.toggle('collapsed'); list.classList.toggle('hidden'); };
    items.forEach(t => {
      const isSel = !!selecionados.find(s => s.id === t.id);
      const item = document.createElement('div');
      item.className = 'topico-item' + (isSel ? ' selected' : '');
      item.innerHTML = `<div class="topico-check">${isSel ? '✓' : ''}</div><div class="topico-nome">${t.nome}</div>`;
      item.onclick = () => toggleTopico(t);
      list.appendChild(item);
    });
    group.appendChild(label); group.appendChild(list); container.appendChild(group);
  });
}

function toggleTopico(t) {
  const idx = selecionados.findIndex(s => s.id === t.id);
  if (idx >= 0) selecionados.splice(idx, 1); else selecionados.push(t);
  const f = document.getElementById('busca').value.toLowerCase();
  renderTopicos(f ? todosTopicos.filter(t => t.nome.toLowerCase().includes(f) || t.categoria.toLowerCase().includes(f)) : todosTopicos);
  renderSelecionados();
}

function renderSelecionados() {
  const list = document.getElementById('selected-list');
  document.getElementById('btn-gerar').disabled = !selecionados.length;
  document.getElementById('sel-count').innerHTML = selecionados.length ? `<span class="count-badge">${selecionados.length}</span>` : '';
  if (!selecionados.length) { list.innerHTML = '<div class="empty-state">Nenhum tópico selecionado.<br>Clique nos tópicos ao lado.</div>'; return; }
  list.innerHTML = '';
  selecionados.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'selected-item'; item.draggable = true;
    item.innerHTML = `<div class="drag-handle">⠿</div><div style="flex:1"><div class="selected-nome">${t.nome}</div><div class="selected-cat">${t.categoria}</div></div><button class="remove-btn">×</button>`;
    item.querySelector('.remove-btn').onclick = e => {
      e.stopPropagation(); selecionados.splice(i, 1);
      const f = document.getElementById('busca').value.toLowerCase();
      renderTopicos(f ? todosTopicos.filter(t => t.nome.toLowerCase().includes(f) || t.categoria.toLowerCase().includes(f)) : todosTopicos);
      renderSelecionados();
    };
    item.addEventListener('dragstart', e => { dragSrc = i; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => { e.preventDefault(); item.classList.remove('drag-over'); if (dragSrc !== null && dragSrc !== i) { selecionados.splice(i, 0, selecionados.splice(dragSrc, 1)[0]); renderSelecionados(); } });
    list.appendChild(item);
  });
}

document.getElementById('busca').addEventListener('input', e => {
  const f = e.target.value.toLowerCase();
  renderTopicos(f ? todosTopicos.filter(t => t.nome.toLowerCase().includes(f) || t.categoria.toLowerCase().includes(f)) : todosTopicos);
});

document.getElementById('btn-gerar').addEventListener('click', async () => {
  const dados = { processo: document.getElementById('processo').value, vara: document.getElementById('vara').value, participante: document.getElementById('participante').value, demanda: document.getElementById('demanda').value, entrega: document.getElementById('entrega').value };
  if (!dados.participante) { showToast('Informe o nome do Autor/Reclamante.', 'error'); return; }
  document.getElementById('loading').classList.add('show');
  try {
    const r = await fetch(`${API}/api/gerar`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ topicos: selecionados.map(t => ({ nome: t.nome, path: t.path })), dados }) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.erro || 'Erro'); }
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Parecer_${dados.participante.split(' ')[0]}_${dados.processo.replace(/[\/\.]/g,'-').substring(0,15)||'sp'}.docx`;
    a.click();
    showToast('Parecer gerado com sucesso!', 'success');
  } catch(e) { showToast('Erro: ' + e.message, 'error'); }
  finally { document.getElementById('loading').classList.remove('show'); }
});

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type ? `show ${type}` : 'show';
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 4000);
}

checkStatus(); carregarTopicos();
</script>
</body>
</html>
